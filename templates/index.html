
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartApply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p { font-size: 13px; color: #8b949e; margin-top: 2px; }
    main { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1rem; }
    .field-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    textarea { width: 100%; height: 200px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; color: #e6edf3; font-size: 13px; resize: vertical; font-family: inherit; line-height: 1.6; }
    textarea:focus { outline: none; border-color: #58a6ff; }
    .row { display: flex; gap: 12px; margin-bottom: 1.5rem; }
    input[type=text] { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 12px; color: #e6edf3; font-size: 13px; }
    input[type=text]:focus { outline: none; border-color: #58a6ff; }
    .btn { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .results { display: none; }
    .score-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 2rem; }
    .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; flex-shrink: 0; }
    .score-high { background: #1a4721; color: #3fb950; border: 2px solid #238636; }
    .score-mid { background: #2d2a0e; color: #d29922; border: 2px solid #9e6a03; }
    .score-low { background: #2d1b1b; color: #f85149; border: 2px solid #da3633; }
    .verdict { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1rem; }
    .list-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.25rem; }
    .list-title { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .tag { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 20px; margin: 2px; }
    .tag.match { background: #1a4721; color: #3fb950; border: 1px solid #238636; }
    .tag.miss { background: #2d1b2e; color: #f0883e; border: 1px solid #bd561d; }
    .bullet-list { list-style: none; }
    .bullet-list li { font-size: 13px; color: #e6edf3; padding: 4px 0; border-bottom: 1px solid #21262d; line-height: 1.5; }
    .bullet-list li:last-child { border-bottom: none; }
    .bullet-list li::before { content: "•"; color: #58a6ff; margin-right: 8px; }
    .cover-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
    .cover-text { font-size: 14px; line-height: 1.8; color: #e6edf3; white-space: pre-wrap; }
    .copy-btn { margin-top: 1rem; }
    .loading { text-align: center; padding: 2rem; color: #8b949e; display: none; }
    .error { background: #2d1b1b; border: 1px solid #f85149; color: #f85149; border-radius: 8px; padding: 12px; margin-bottom: 1rem; display: none; font-size: 13px; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; margin-top: 1.5rem; }
    footer { background: #161b22; border-top: 1px solid #30363d; padding: 1rem 2rem; text-align: center; font-size: 13px; color: #8b949e; margin-top: 2rem; }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>SmartApply</h1>
    <p>Paste a job description and your resume — get an AI match score, gap analysis, and cover letter</p>
  </header>
  <main>
    <div class="input-grid">
      <div>
        <div class="field-label">Your Resume</div>
        <textarea id="resume" placeholder="Paste your resume text here..."></textarea>
      </div>
      <div>
        <div class="field-label">Job Description</div>
        <textarea id="jobDesc" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>
    <div class="row">
      <input type="text" id="company" placeholder="Company name (e.g. Google)" />
      <input type="text" id="role" placeholder="Role (e.g. Software Engineer)" />
      <button class="btn btn-primary" onclick="analyze()">Analyze Match</button>
      <button class="btn btn-secondary" onclick="generateCoverLetter()">Generate Cover Letter</button>
    </div>

    <div class="error" id="errorBox"></div>
    <div class="loading" id="loadingBox">Analyzing with Claude AI...</div>

    <div class="results" id="results">
      <div class="score-card">
        <div class="score-circle" id="scoreCircle">—</div>
        <div>
          <div class="verdict" id="verdict"></div>
          <div style="font-size:13px; color:#8b949e;" id="scoreLabel"></div>
        </div>
      </div>

      <div class="two-col">
        <div class="list-card">
          <div class="list-title">Matched Keywords</div>
          <div id="matchedKeywords"></div>
        </div>
        <div class="list-card">
          <div class="list-title">Missing Keywords</div>
          <div id="missingKeywords"></div>
        </div>
      </div>

      <div class="two-col">
        <div class="list-card">
          <div class="list-title">Strengths</div>
          <ul class="bullet-list" id="strengths"></ul>
        </div>
        <div class="list-card">
          <div class="list-title">Gaps to Address</div>
          <ul class="bullet-list" id="gaps"></ul>
        </div>
      </div>
    </div>

    <div id="coverLetterSection" style="display:none;">
      <div class="section-title">Cover Letter</div>
      <div class="cover-card">
        <div class="cover-text" id="coverText"></div>
        <button class="btn btn-secondary copy-btn" onclick="copyLetter()">Copy to clipboard</button>
      </div>
    </div>
  </main>

  <footer>
    Made by <a href="https://hkhatib005.github.io/Hatem/" target="_blank">Hatem Alkhatib</a>
  </footer>

  <script>
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 5000);
    }

    function setLoading(show, msg) {
      const box = document.getElementById('loadingBox');
      box.textContent = msg || 'Analyzing with Claude AI...';
      box.style.display = show ? 'block' : 'none';
    }

    async function analyze() {
      const resume = document.getElementById('resume').value.trim();
      const jobDesc = document.getElementById('jobDesc').value.trim();
      if (!resume || !jobDesc) { showError('Please paste both your resume and the job description.'); return; }

      setLoading(true, 'Analyzing with Claude AI...');
      document.getElementById('results').style.display = 'none';

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume, job_description: jobDesc })
        });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }

        const score = data.match_score;
        const circle = document.getElementById('scoreCircle');
        circle.textContent = score + '%';
        circle.className = 'score-circle ' + (score >= 70 ? 'score-high' : score >= 45 ? 'score-mid' : 'score-low');
        document.getElementById('verdict').textContent = data.verdict;
        document.getElementById('scoreLabel').textContent = score >= 70 ? 'Strong match' : score >= 45 ? 'Moderate match' : 'Weak match — review gaps below';

        document.getElementById('matchedKeywords').innerHTML = data.matched_keywords.map(k => `<span class="tag match">${k}</span>`).join('');
        document.getElementById('missingKeywords').innerHTML = data.missing_keywords.map(k => `<span class="tag miss">${k}</span>`).join('');
        document.getElementById('strengths').innerHTML = data.strengths.map(s => `<li>${s}</li>`).join('');
        document.getElementById('gaps').innerHTML = data.gaps.map(g => `<li>${g}</li>`).join('');

        document.getElementById('results').style.display = 'block';
      } catch(e) {
        showError('Something went wrong: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    async function generateCoverLetter() {
      const resume = document.getElementById('resume').value.trim();
      const jobDesc = document.getElementById('jobDesc').value.trim();
      const company = document.getElementById('company').value.trim() || 'the company';
      const role = document.getElementById('role').value.trim() || 'this role';
      if (!resume || !jobDesc) { showError('Please paste both your resume and the job description.'); return; }

      setLoading(true, 'Writing your cover letter...');
      document.getElementById('coverLetterSection').style.display = 'none';

      try {
        const res = await fetch('/api/cover-letter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resume, job_description: jobDesc, company, role })
        });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        document.getElementById('coverText').textContent = data.cover_letter;
        document.getElementById('coverLetterSection').style.display = 'block';
      } catch(e) {
        showError('Something went wrong: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    function copyLetter() {
      const text = document.getElementById('coverText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
      });
    }
  </script>
</body>
</html>
